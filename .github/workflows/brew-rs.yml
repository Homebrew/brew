name: brew-rs

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:

permissions:
  contents: read

env:
  HOMEBREW_DEVELOPER: 1
  HOMEBREW_NO_AUTO_UPDATE: 1
  HOMEBREW_NO_ENV_HINTS: 1
  HOMEBREW_NO_INSTALL_CLEANUP: 1
  HOMEBREW_RUST_FRONTEND: 1

defaults:
  run:
    shell: bash -xeuo pipefail {0}

jobs:
  brew-rs:
    name: ${{ matrix.name }}
    if: github.repository_owner == 'Homebrew'
    runs-on: ${{ matrix.runs-on }}
    strategy:
      matrix:
        include:
          - name: brew-rs (Linux)
            runs-on: ubuntu-latest
          - name: brew-rs (macOS)
            runs-on: macos-26
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          core: true
          cask: false

      - uses: Homebrew/actions/cache-homebrew-prefix@main
        with:
          install: hyperfine rust
          workflow-key: brew-rs

      - uses: actions/checkout@v4

      - name: Cache Bundler RubyGems
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ matrix.runs-on }}-brew-rs-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ matrix.runs-on }}-brew-rs-rubygems-

      - name: Install Bundler RubyGems
        run: brew install-bundler-gems --groups=tests

      - name: Build brew-rs
        run: ./Library/Homebrew/rust/brew-rs/rake -f Library/Homebrew/rust/brew-rs/Rakefile build

      - name: Check brew-rs formatting
        run: ./Library/Homebrew/rust/brew-rs/rake -f Library/Homebrew/rust/brew-rs/Rakefile fmt

      - name: Lint brew-rs
        run: ./Library/Homebrew/rust/brew-rs/rake -f Library/Homebrew/rust/brew-rs/Rakefile clippy

      - name: Test brew-rs crate
        run: ./Library/Homebrew/rust/brew-rs/rake -f Library/Homebrew/rust/brew-rs/Rakefile test

      - name: Run brew-rs integration tests
        run: ./bin/brew tests --only=cmd/brew_rs --no-parallel

      - name: Benchmark brew-rs
        run: ./Library/Homebrew/rust/brew-rs/rake -f Library/Homebrew/rust/brew-rs/Rakefile benchmark

      - name: Stage brew-rs into default-prefix Homebrew
        run: BREW_RS_STAGE_REPOSITORY="${{ steps.set-up-homebrew.outputs.repository-path }}" ./Library/Homebrew/rust/brew-rs/rake -f Library/Homebrew/rust/brew-rs/Rakefile stage

      - name: Prepare smoke test formula
        run: brew uninstall --force hello || true

      - name: Smoke-test brew-rs install
        run: brew install hello

      - name: Smoke-test brew-rs upgrade
        run: brew upgrade hello

      - name: Smoke-test brew-rs uninstall
        run: brew uninstall hello

      - name: Smoke-test brew-rs update
        run: brew update --quiet --force

      - name: Upload brew-rs artifact
        uses: actions/upload-artifact@v4
        with:
          name: brew-rs-${{ runner.os }}-${{ runner.arch }}
          path: Library/Homebrew/vendor/brew-rs/brew-rs
